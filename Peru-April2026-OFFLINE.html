  _mk.forEach(m=>_map.removeLayer(m));_ln.forEach(l=>_map.removeLayer(l));_mk=[];_ln=[];
  const day=(S.trip?.days||[])[di];if(!day)return;
  const c=col(di),coords=[];
  (day.activities||[]).forEach((a,i)=>{
    if(!a.lat||!a.lng)return;
    const m=L.circleMarker([a.lat,a.lng],{radius:10,fillColor:c,color:'#fff',weight:2,fillOpacity:.9}).addTo(_map);
    m.bindPopup(`<strong>${a.name}</strong><br><span style="color:#94a3b8">${a.time||''} · ${a.duration||''} · ${fc(a.cost||0)}</span><br><small>${(a.desc||'').substring(0,90)}…</small>`);
    const lbl=L.divIcon({className:'',html:`<div style="background:${c};color:#fff;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.4)">${i+1}. ${a.name}</div>`,iconAnchor:[-8,12]});
    _mk.push(m,L.marker([a.lat,a.lng],{icon:lbl}).addTo(_map));
    coords.push([a.lat,a.lng]);
  });
  if(coords.length>1){const l=L.polyline(coords,{color:c,weight:3,opacity:.7,dashArray:'8,8'}).addTo(_map);_ln.push(l);}
  if(coords.length)_map.fitBounds(coords,{padding:[60,60]});
}
function showAllMap(){
  if(!_map)return;
  _mk.forEach(m=>_map.removeLayer(m));_ln.forEach(l=>_map.removeLayer(l));_mk=[];_ln=[];
  const allC=[];
  (S.trip?.days||[]).forEach((day,di)=>{
    const c=col(di),dc=[];
    (day.activities||[]).forEach(a=>{
      if(!a.lat||!a.lng)return;
      const m=L.circleMarker([a.lat,a.lng],{radius:7,fillColor:c,color:'#fff',weight:1.5,fillOpacity:.8}).addTo(_map);
      m.bindPopup(`<strong>Day ${day.dayNum}: ${a.name}</strong><br>${day.destination}`);
      _mk.push(m);dc.push([a.lat,a.lng]);allC.push([a.lat,a.lng]);
    });
    if(dc.length>1){const l=L.polyline(dc,{color:c,weight:2,opacity:.5,dashArray:'6,6'}).addTo(_map);_ln.push(l);}
  });
  (S.trip?.destinations||[]).forEach(d=>{
    if(!d.lat||!d.lng)return;
    const ic=L.divIcon({className:'',html:`<div style="background:${d.color||col(0)};color:#fff;padding:4px 11px;border-radius:11px;font-size:12px;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.4)">${d.name}</div>`,iconAnchor:[36,14]});
    _mk.push(L.marker([d.lat,d.lng],{icon:ic}).addTo(_map));
  });
  if(allC.length)_map.fitBounds(allC,{padding:[80,80]});
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────
function acard(a,di){
  const c=col(di);
  const icon=a.period==='Morning'?'fa-sunrise':a.period==='Afternoon'?'fa-sun':a.period==='Evening'?'fa-sunset':'fa-moon';
  return `<div class="acard ${S.selAct===a.id?'sel':''}" style="border-left-color:${c}" onclick="S.selAct=S.selAct==='${a.id}'?null:'${a.id}';render()">
    <div class="atime" style="color:${c}"><i class="fas ${icon}"></i> ${a.time||''} · ${a.period||''}</div>
    <div class="aname">${a.name}</div>
    <div class="adesc">${a.desc||''}</div>
    <div class="ameta">
      <span><i class="fas fa-clock"></i> ${a.duration||'—'}</span>
      <span><i class="fas fa-coins"></i> ${fc(a.cost||0)}</span>
      ${a.rating?`<span><i class="fas fa-star" style="color:#fbbf24"></i> ${a.rating}</span>`:''}
    </div>
    ${a.booking?'<span class="abadge req"><i class="fas fa-ticket"></i> Booked</span>':''}
    ${a.website?`<div class="alinks"><a href="${a.website}" target="_blank" class="btn btn-sm btn-p" onclick="event.stopPropagation()"><i class="fas fa-external-link-alt"></i> Visit</a></div>`:''}
  </div>`;
}
function tcard(t){
  if(!t?.options?.length)return'';
  return `<div class="tcard"><i class="fas fa-route" style="color:var(--acl)"></i>
    <div style="flex:1;font-size:11px">${t.options.slice(0,3).map(x=>`<span style="margin-right:10px"><i class="fas ${x.icon||'fa-route'}"></i> ${x.mode} ${x.time}${x.cost&&x.cost!=='Free'?' · '+x.cost:''}</span>`).join('')}</div>
  </div>`;
}

// ── VIEWS ──────────────────────────────────────────────────────────────────
function vItinerary(){
  const days=S.trip?.days||[];
  const day=days[S.day];
  if(!day)return`<div style="padding:60px;text-align:center"><p>No day selected.</p></div>`;
  const b=dayBudget(day);
  const dc=col(S.day);
  return `
    <div class="sh">
      <h2>Day ${day.dayNum}: ${day.label||day.destination}</h2>
      <div style="display:flex;gap:10px;align-items:center">
        ${day.weather?`<span style="font-size:13px;color:var(--muted)"><i class="fas ${day.weather.icon||'fa-sun'}"></i> ${day.weather.high||day.weather.temp||'—'}°C</span>`:''}
        <span style="background:var(--bg3);padding:5px 11px;border-radius:var(--r2);font-size:12.5px;font-weight:600">S/${b.total}</span>
      </div>
    </div>
    <div class="itin-content">
      ${days.length>1?`<div class="weather-strip">${days.slice(Math.max(0,S.day-1),S.day+6).map(d=>`<div class="wday"><div class="wd">${fd(d.date)}</div><i class="fas ${d.weather?.icon||'fa-sun'}" style="color:${(d.weather?.condition||'').includes('un')?'#fbbf24':'#94a3b8'}"></i><div class="wt">${d.weather?.high||d.weather?.temp||'—'}°</div></div>`).join('')}</div>`:''}
      ${renderLogistics(day)}
      <div class="timeline">
        ${(day.activities||[]).map((a,i)=>{
          const trNext=(day.transports||[])[i];
          return `<div class="tevent">
            <style>.tevent::before{background:${dc}!important}</style>
            <div class="te-time" style="color:${dc}"><i class="fas ${a.period==='Morning'?'fa-sunrise':a.period==='Afternoon'?'fa-sun':a.period==='Evening'?'fa-sunset':'fa-moon'}"></i> ${a.time||''} · ${a.period||''}</div>
            <div class="te-name">${a.name}</div>
            <div class="te-desc">${a.desc||''}</div>
            <div class="te-pills">
              <span class="pill"><i class="fas fa-clock"></i> ${a.duration||'—'}</span>
              <span class="pill"><i class="fas fa-coins"></i> ${fc(a.cost||0)}</span>
              ${a.rating?`<span class="pill"><i class="fas fa-star" style="color:#fbbf24"></i> ${a.rating}</span>`:''}
              ${a.booking?'<span class="pill book"><i class="fas fa-ticket"></i> BOOKED ✓</span>':''}
              ${a.hours?`<span class="pill"><i class="fas fa-door-open"></i> ${a.hours}</span>`:''}
            </div>
            ${a.website?`<div style="margin-top:8px"><a href="${a.website}" target="_blank" class="btn btn-sm btn-p"><i class="fas fa-external-link-alt"></i> Visit Website</a></div>`:''}
            ${trNext?.options?.length?`<div class="te-transport">${trNext.options.slice(0,3).map(o=>`<span><i class="fas ${o.icon||'fa-route'}"></i> ${o.mode}: ${o.time} (${o.cost})</span>`).join('')}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderLogistics(day){
  const t=S.trip;
  const fl=(t?.logistics?.flights||[]).filter(f=>f.date===day.date);
  const tr=(t?.logistics?.trains||[]).filter(x=>x.date===day.date);
  const ho=(t?.logistics?.hotels||[]).filter(h=>h.city===day.destination&&h.checkin===day.date);
  if(!fl.length&&!tr.length&&!ho.length)return'';
  return `<div style="margin-bottom:18px">
    <h3 style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">LOGISTICS</h3>
    ${fl.map(f=>`<div class="lcard" style="margin-bottom:6px"><i class="fas fa-plane" style="color:#818cf8"></i><div class="linfo"><div class="lm">${f.from} → ${f.to}</div><div class="ls">${f.airline||''} · ${f.depart||''} → ${f.arrive||''}</div></div></div>`).join('')}
    ${tr.map(x=>`<div class="lcard" style="margin-bottom:6px"><i class="fas fa-train" style="color:#f97316"></i><div class="linfo"><div class="lm">${x.from} → ${x.to}</div><div class="ls">${x.service||''} · ${x.depart||''} → ${x.arrive||''}</div></div></div>`).join('')}
    ${ho.map(h=>`<div class="lcard" style="margin-bottom:6px"><i class="fas fa-hotel" style="color:#22c55e"></i><div class="linfo"><div class="lm">${h.name}</div><div class="ls">${h.address||''}</div></div></div>`).join('')}
  </div>`;
}

function vMap(){
  return `<div style="width:100%;height:100%;position:relative">
    <div id="map"></div>
    <div class="map-overlay">
      <div class="map-legend">
        <h4>Destinations</h4>
        ${(S.trip?.destinations||[]).map((d,i)=>`<div class="leg-item"><div class="leg-dot" style="background:${d.color||col(i)}"></div>${d.name}</div>`).join('')}

    </div>
  </div>`;

function vBudget(){
  const days=S.trip?.days||[];
  const tb=tripBudget();
  const hotels=(S.trip?.logistics?.hotels||[]).reduce((s,h)=>{const n=Math.round((new Date(h.checkout)-new Date(h.checkin))/86400000)||0;return s+(h.cost||0)*n;},0);
  const flights=(S.trip?.logistics?.flights||[]).reduce((s,f)=>s+(f.cost||0),0);
  const grand=tb.total+hotels+flights;
  return `<div class="sh"><h2>Budget Tracker</h2><span style="font-size:12px;color:var(--muted)">Costs in Peruvian Soles (S/) approx</span></div>
    <div class="budget-wrap">

        <div class="bcard" style="border-top-color:var(--accent)">
          <h3>Total Estimate</h3>
          <div class="bamt" style="color:var(--acl)">S/${grand.toLocaleString()}</div>
          <div style="margin-top:12px">
            <div class="brow"><span>Activities</span><span>S/${tb.acts}</span></div>
            <div class="brow"><span>Food</span><span>S/${tb.food}</span></div>
            <div class="brow"><span>Transport</span><span>S/${tb.tr}</span></div>
            ${hotels?`<div class="brow"><span>Hotels</span><span>S/${hotels}</span></div>`:''}
            ${flights?`<div class="brow"><span>Flights</span><span>$${flights} USD</span></div>`:''}
          </div>
        </div>
        <div class="bcard" style="border-top-color:var(--ok)">
          <h3>Daily Average</h3>

          <div style="font-size:12px;color:var(--muted);margin-top:8px">Excl. flights & hotels</div>
        </div>
        <div class="bcard" style="border-top-color:var(--warn)">
          <h3>Breakdown</h3>
          <div style="margin-top:8px">
            ${[{l:'Food',v:tb.food,c:'#f97316'},{l:'Activities',v:tb.acts,c:'#6366f1'},{l:'Transport',v:tb.tr,c:'#22c55e'}].map(x=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:3px"><span>${x.l}</span><span>S/${x.v} (${tb.total?Math.round(x.v/tb.total*100):0}%)</span></div><div class="bbar"><div class="bfill" style="width:${tb.total?Math.round(x.v/tb.total*100):0}%;background:${x.c}"></div></div></div>`).join('')}
          </div>

    </div>`;
}

      ${(vegDishes.dishes||[]).map(d=>`<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)"><span style="font-size:13.5px;font-weight:700;color:var(--txt)">${d.name}</span><span style="font-size:12.5px;color:var(--muted)"> — ${d.desc}</span></div>`).join('')}

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid ${sec.color||'var(--acl)'}40">
        <div style="width:34px;height:34px;border-radius:10px;background:${sec.color||'var(--acl)'}22;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fas ${sec.icon||'fa-info'}" style="color:${sec.color||'var(--acl)'}"></i>
        </div>
        <div style="font-size:14.5px;font-weight:700;color:var(--txt)">${sec.title||''}</div>
      </div>
      ${(sec.items||[]).map(item=>`<div style="background:var(--bg2);border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:3px solid ${sec.color||'var(--acl)'}">
        <div style="font-size:13.5px;font-weight:700;color:var(--txt);margin-bottom:5px">${item.name||''}</div>
        <div style="font-size:13px;color:var(--txt2);line-height:1.6">${item.detail||''}</div>
      </div>`).join('')}
    </div>`).join('')}
  </div>`;
}

function vExport(){
  return `<div class="moverlay" onclick="if(event.target===this){S.showExport=false;render()}">
    <div class="modal">
      <h3><i class="fas fa-share-from-square" style="color:var(--acl);margin-right:8px"></i> Export Trip</h3>
      <div class="exp-opts">
        <div class="exp-opt" onclick="exportTxt()"><i class="fas fa-file-lines" style="color:#6366f1"></i><div><div class="et">Text Itinerary</div><div class="es">Plain text for printing or sharing</div></div></div>
        <div class="exp-opt" onclick="exportPDF()"><i class="fas fa-file-pdf" style="color:#ef4444"></i><div><div class="et">Print / Save as PDF</div><div class="es">Opens print dialog — save as PDF</div></div></div>
      </div>
      <div style="text-align:right;margin-top:14px"><button class="btn btn-g" onclick="S.showExport=false;render()">Close</button></div>
    </div>
  </div>`;
}

function exportTxt(){
  const t=S.trip;if(!t)return;
  let txt=`${t.meta?.name||'Trip'}\n${'='.repeat(50)}\n${(t.destinations||[]).map(d=>d.name).join(' → ')}\n\n`;
  (t.days||[]).forEach(d=>{
    txt+=`DAY ${d.dayNum} — ${d.destination.toUpperCase()} (${fdf(d.date)})\n${'-'.repeat(40)}\n`;
    (d.activities||[]).forEach(a=>{txt+=`${a.time||''} | ${a.name}\n  ${a.desc||''}\n  ${a.duration||''} · ${fc(a.cost||0)}\n\n`;});
  });
  const blob=new Blob([txt],{type:'text/plain'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='Peru-April-2026.txt';a.click();URL.revokeObjectURL(url);
  toast('Downloaded!');S.showExport=false;render();
}
function exportPDF(){
  const t=S.trip;if(!t)return;
  let html=`<!DOCTYPE html><html><head><style>body{font-family:Arial,sans-serif;max-width:780px;margin:0 auto;padding:20px}h1{color:#6366f1}h2{border-bottom:2px solid #e2e8f0;padding-bottom:7px;margin-top:28px}.a{margin:10px 0;padding:10px;border-left:3px solid #6366f1;background:#f8fafc}.m{font-size:11px;color:#64748b}</style></head><body>`;
  html+=`<h1>${t.meta?.name||'My Trip'}</h1><p>${(t.destinations||[]).map(d=>d.name).join(' → ')} · April 2–9, 2026</p>`;
  (t.days||[]).forEach(d=>{html+=`<h2>Day ${d.dayNum} — ${d.destination} (${fdf(d.date)})</h2>`;(d.activities||[]).forEach(a=>{html+=`<div class="a"><strong>${a.time||''} — ${a.name}</strong><br>${a.desc||''}<br><span class="m">${a.duration||''} · ${fc(a.cost||0)}</span></div>`;});});
  html+='</body></html>';
  const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  S.showExport=false;render();
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function renderSidebar(){
  const days=S.trip?.days||[];
  const day=days[S.day];
  const tabs=[
    {id:'itinerary',icon:'fa-calendar-days',label:'Itinerary'},
    {id:'map',icon:'fa-map',label:'Map'},
    {id:'budget',icon:'fa-chart-pie',label:'Budget'},
    {id:'restaurants',icon:'fa-utensils',label:'Dining'},
    {id:'packing',icon:'fa-suitcase-rolling',label:'Packing'},
    {id:'daytrips',icon:'fa-compass',label:'Day Trips'},
    {id:'logistics',icon:'fa-plane',label:'Logistics'},
    {id:'journal',icon:'fa-book-open',label:'Journal'},
    {id:'culture',icon:'fa-masks-theater',label:'Culture'},
  ];
  return `<div class="sidebar">
    <div class="tab-nav">${tabs.map(t=>`<button class="tn ${S.tab===t.id?'on':''}" onclick="switchTab('${t.id}')"><i class="fas ${t.icon}"></i> ${t.label}</button>`).join('')}</div>
    <div class="sidebar-scroll">
      <div class="day-tabs">${days.map((d,i)=>`<div class="dtab ${i===S.day?'on':''}" onclick="switchDay(${i})" style="${i===S.day?'background:'+col(i)+';border-color:'+col(i):''}"><div>Day ${d.dayNum}</div><div style="font-size:9px;opacity:.8">${fd(d.date)}</div></div>`).join('')}</div>
      ${day?`<div class="day-meta"><strong>${day.destination}</strong><span style="font-size:11px;color:var(--muted)">${fd(day.date)} · ${day.label||''}</span>${day.weather?`<span style="margin-left:auto;font-size:12px"><i class="fas ${day.weather.icon||'fa-sun'}"></i> ${day.weather.high||'—'}°</span>`:''}</div>`:''}
      ${day?(day.activities||[]).map((a,i)=>acard(a,S.day)+((day.transports||[])[i]?tcard((day.transports||[])[i]):'')).join(''):''}
    </div>
  </div>`;
}

function renderMain(){
  switch(S.tab){
    case'itinerary':return vItinerary();
    case'map':return vMap();
    case'budget':return vBudget();
    case'restaurants':return vRestaurants();
    case'packing':return vPacking();
    case'daytrips':return vDayTrips();
    case'logistics':return vLogistics();
    case'journal':return vJournal();
    case'culture':return vCulture();
    default:return vItinerary();
  }
}

function render(){
  const t=S.trip;
  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <div class="logo"><i class="fas fa-route"></i> SmartTrip AI</div>
      <div class="trip-title">${t.meta?.name||'Peru 2026'}<div class="trip-route">${(t.destinations||[]).map(d=>d.name).join(' → ')}</div></div>
      <div class="topbar-right">
        <div class="claude-dot"><div class="dot"></div> Ready</div>
        <button class="btn btn-s btn-sm" onclick="S.showExport=true;render()"><i class="fas fa-share-from-square"></i> Export</button>
      </div>
    </div>
    <div class="body">
      ${renderSidebar()}
      <div class="main">${renderMain()}</div>
    </div>
    ${S.showExport?vExport():''}
  `;
  if(S.tab==='map')setTimeout(initMap,80);
}

function switchTab(t){S.tab=t;render();if(t==='map')setTimeout(initMap,80);}
function switchDay(i){S.day=i;S.selAct=null;render();if(S.tab==='map'&&_map)renderMapDay(i);}

render();
</script>
</body>
</html>
