<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTrip AI — Peru April 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--card:#1e293b;--hover:#2d3a4f;--txt:#f1f5f9;--txt2:#94a3b8;--muted:#64748b;--accent:#6366f1;--acl:#818cf8;--aglow:rgba(99,102,241,.3);--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--border:#334155;--r:12px;--r2:8px;--sh:0 4px 24px rgba(0,0,0,.35);--tr:all .22s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
#app{height:100vh;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:20}
.logo{font-size:17px;font-weight:800;background:linear-gradient(135deg,#818cf8,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.trip-title{font-size:14px;font-weight:600;margin-left:8px;padding-left:16px;border-left:1px solid var(--border)}
.trip-route{font-size:11px;color:var(--muted)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.claude-dot{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:20px;font-size:11px;font-weight:600;color:#4ade80}
.claude-dot .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.body{flex:1;display:grid;grid-template-columns:320px 1fr;overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tab-nav{display:flex;flex-wrap:wrap;gap:3px;padding:10px 10px 6px;border-bottom:1px solid var(--border)}
.tn{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:var(--r2);background:none;border:none;color:var(--muted);cursor:pointer;font-size:11.5px;font-weight:500;transition:var(--tr);font-family:inherit;white-space:nowrap}
.tn:hover{background:var(--hover);color:var(--txt)}.tn.on{background:rgba(99,102,241,.15);color:var(--acl)}.tn i{font-size:12px}
.sidebar-scroll{flex:1;overflow-y:auto;padding:10px}
.day-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px}
.dtab{flex-shrink:0;padding:6px 11px;border-radius:14px;background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:600;transition:var(--tr);text-align:center;min-width:64px}
.dtab:hover{border-color:var(--accent)}.dtab.on{color:#fff}
.day-meta{display:flex;align-items:center;gap:8px;padding:2px 2px 8px;font-size:13px;flex-wrap:wrap}
.acard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:7px;cursor:pointer;transition:var(--tr);position:relative;border-left-width:3px}
.acard:hover{border-top-color:var(--accent);border-right-color:var(--accent);border-bottom-color:var(--accent)}.acard.sel{box-shadow:0 0 0 2px var(--aglow)}
.atime{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.aname{font-size:14px;font-weight:600;margin-bottom:3px}
.adesc{font-size:11.5px;color:var(--txt2);line-height:1.5;margin-bottom:8px}
.ameta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted)}
.ameta span{display:flex;align-items:center;gap:3px}
.abadge{position:absolute;top:10px;right:10px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.abadge.req{background:rgba(239,68,68,.12);color:#f87171}
.alinks{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.tcard{background:rgba(99,102,241,.05);border-left:2px solid var(--accent);border-radius:0 var(--r2) var(--r2) 0;padding:7px 10px;margin:3px 0;font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:8px}
.tcard i{color:var(--acl);width:14px;text-align:center}
.main{overflow-y:auto;background:var(--bg);position:relative}
.sh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:5}
.sh h2{font-size:15px;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border:none;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);font-family:inherit}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--acl);box-shadow:0 0 18px var(--aglow)}
.btn-s{background:var(--bg3);color:var(--txt)}.btn-s:hover{background:var(--hover)}
.btn-g{background:transparent;color:var(--txt2)}.btn-g:hover{background:var(--bg3);color:var(--txt)}
.btn-sm{padding:5px 12px;font-size:11.5px}
.itin-content{padding:18px}
.weather-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px}
.wday{flex-shrink:0;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);text-align:center;min-width:72px}
.wday .wt{font-size:17px;font-weight:700}.wday .wd{font-size:10px;color:var(--muted)}.wday i{font-size:18px;margin:5px 0;display:block}
.timeline{position:relative;padding-left:22px}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--bg3);border-radius:1px}
.tevent{position:relative;margin-bottom:22px}
.tevent::before{content:'';position:absolute;left:-27px;top:5px;width:12px;height:12px;border-radius:50%;border:3px solid var(--bg)}
.te-time{font-size:11px;font-weight:700;margin-bottom:3px}
.te-name{font-size:15px;font-weight:700;margin-bottom:5px}
.te-desc{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:10px}
.te-pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg2);border-radius:10px;font-size:11.5px}
.pill.book{background:rgba(239,68,68,.1);color:#f87171}
.te-transport{display:flex;gap:12px;flex-wrap:wrap;padding:8px 12px;background:var(--bg2);border-radius:var(--r2);margin-top:8px;font-size:12px;color:var(--txt2)}
.te-transport span{display:flex;align-items:center;gap:4px}
#map{width:100%;height:100%}
.leaflet-popup-content-wrapper{background:var(--bg2) !important;color:var(--txt) !important;border-radius:var(--r2) !important;border:1px solid var(--border) !important;box-shadow:var(--sh) !important}
.leaflet-popup-tip{background:var(--bg2) !important}
.leaflet-popup-content{font-family:inherit !important;font-size:13px !important}
.map-overlay{position:absolute;top:14px;right:14px;z-index:500;display:flex;flex-direction:column;gap:8px}
.map-legend{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;font-size:12px}
.map-legend h4{font-size:10px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;letter-spacing:.5px}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.leg-dot{width:9px;height:9px;border-radius:50%}
.map-day-btns{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:500;display:flex;gap:6px;flex-wrap:wrap;max-width:90%}
.budget-wrap{padding:18px}
.bsummary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.bcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;border-top-width:3px}
.bcard h3{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:8px}
.bamt{font-size:28px;font-weight:800}
.brow{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--border)}
.brow:last-child{border:none}
.bbar{height:5px;background:var(--bg3);border-radius:3px;margin-top:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px}
.bday-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.bday-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rest-filters{display:flex;gap:6px;padding:12px 18px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.fc{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:none;color:var(--txt2);font-size:12px;cursor:pointer;transition:var(--tr);font-family:inherit}
.fc:hover,.fc.on{border-color:var(--accent);color:var(--acl);background:rgba(99,102,241,.1)}
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:18px}
.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:var(--tr)}
.rcard:hover{border-color:var(--accent);transform:translateY(-2px)}
.rimg{height:100px;display:flex;align-items:center;justify-content:center;font-size:38px}
.rinfo{padding:14px}
.rname{font-size:14px;font-weight:600;margin-bottom:3px}
.rcuisine{font-size:11.5px;color:var(--acl);margin-bottom:6px}
.rdesc{font-size:12px;color:var(--txt2);margin-bottom:8px;line-height:1.5}
.rmeta{display:flex;gap:10px;font-size:11.5px;color:var(--muted);margin-bottom:10px}
.rmeta span{display:flex;align-items:center;gap:3px}
.pack-wrap{padding:18px;max-width:680px}
.pack-prog{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px}
.ppbar{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.ppfill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.pack-cat{margin-bottom:22px}
.pack-cat h3{font-size:13.5px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.pack-cat h3 i{color:var(--acl)}
.pitem{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r2);cursor:pointer;transition:var(--tr);font-size:13px}
.pitem:hover{background:var(--bg2)}
.pcheck{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr)}
.pitem.done .pcheck{background:var(--accent);border-color:var(--accent)}
.pitem.done span{text-decoration:line-through;color:var(--muted)}
.dt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:18px}
.dtcard2{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:var(--tr)}
.dtcard2:hover{border-color:var(--accent);transform:translateY(-2px)}
.dtbanner{height:130px;display:flex;align-items:flex-end;padding:14px;position:relative}
.dtbanner::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),transparent)}
.dtbanner h3{position:relative;font-size:17px;font-weight:700}
.dtbody{padding:14px}
.dtmeta{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin-bottom:10px}
.dtmeta span{display:flex;align-items:center;gap:3px}
.dttags{display:flex;flex-wrap:wrap;gap:5px}
.dttag{padding:3px 9px;background:var(--bg);border-radius:10px;font-size:11px;color:var(--txt2)}
.log-wrap{padding:18px}
.log-section{margin-bottom:24px}
.log-section h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lcard{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px}
.lcard i{font-size:18px;width:28px;text-align:center}
.lcard .linfo .lm{font-weight:600;font-size:13.5px}
.lcard .linfo .ls{font-size:11.5px;color:var(--muted);margin-top:1px}
.jour-wrap{padding:18px;max-width:680px}
.jday{margin-bottom:28px}
.jday h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.jentry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.jentry .jn{font-weight:600;font-size:13px;margin-bottom:7px}
.jentry textarea{width:100%;background:transparent;border:none;color:var(--txt);font-size:13px;font-family:inherit;resize:none;line-height:1.6}
.jentry textarea:focus{outline:none}
.jstars{display:flex;gap:3px;margin-top:7px}
.jstar{cursor:pointer;color:var(--muted);font-size:15px;transition:var(--tr)}.jstar.on{color:#fbbf24}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);z-index:9999;display:flex;align-items:center;gap:8px;font-size:13.5px;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{border-color:var(--ok)}.toast.err{border-color:var(--err)}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:1200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:440px;box-shadow:var(--sh)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.exp-opts{display:flex;flex-direction:column;gap:8px}
.exp-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:var(--tr)}
.exp-opt:hover{border-color:var(--accent)}
.exp-opt i{font-size:20px;width:28px;text-align:center}
.exp-opt .et{font-size:13.5px;font-weight:600}.exp-opt .es{font-size:11.5px;color:var(--muted)}
.set-wrap{padding:18px;max-width:580px}
.set-section{margin-bottom:28px}
.set-section h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.set-section h3 i{color:var(--acl)}
.set-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;font-size:13px}
.set-row .sr-label{flex:1;color:var(--txt2)}
.set-row .sr-val{color:var(--acl);font-weight:600}

// ── EMBEDDED TRIP DATA ──────────────────────────────────────────────────────
const TRIP_DATA = {"meta": {"name": "Peru Adventure \u2014 April 2026", "startDate": "2026-04-02", "endDate": "2026-04-09", "lastUpdated": "2026-03-28T22:00:00Z", "pacing": "active", "interests": ["culture", "history", "nature", "adventure", "food"], "vegetarianDishes": {"title": "Must-Try Vegetarian Dishes in Peru", "dishes": [{"name": "Causa Lime\u00f1a", "desc": "Chilled mashed yellow potato cake layered with avocado, aji amarillo cream & vegetables \u2014 Lima's most iconic starter"}, {"name": "Papas a la Huanca\u00edna", "desc": "Sliced boiled potatoes smothered in a silky, mildly spicy yellow pepper & queso fresco sauce \u2014 everywhere and always great"}, {"name": "Ceviche vegano", "desc": "Hearts of palm or mushroom 'ceviche' in leche de tigre citrus marinade with red onion, aj\u00ed & cilantro"}, {"name": "Lomo saltado vegano", "desc": "Mushroom & tofu stir-fry with tomato, peppers, soy sauce & crispy fries \u2014 a plant-based spin on Peru's most beloved dish"}, {"name": "Sopa de quinoa", "desc": "Warming Andean quinoa soup with herbs and vegetables \u2014 essential in Cusco to help with altitude acclimatisation"}, {"name": "Rocoto relleno", "desc": "Cusco speciality: a fiery red pepper stuffed with cheese, vegetables & spices then baked"}, {"name": "Choclo con queso", "desc": "Giant Andean corn cob served with fresh cheese \u2014 deceptively simple and completely addictive"}, {"name": "Humitas", "desc": "Steamed fresh corn cakes with cheese inside, wrapped in corn husks \u2014 a Peruvian comfort snack"}, {"name": "Tacu tacu", "desc": "Crispy pan-fried cake of leftover rice and beans, topped with salsa criolla \u2014 soulful Lima street food"}, {"name": "Picarones", "desc": "Pumpkin & sweet potato fritters drizzled with chancaca (dark sugar cane syrup) \u2014 Lima's best dessert"}, {"name": "Mazamorra morada", "desc": "Purple corn pudding with dried fruits and spices \u2014 a uniquely Peruvian dessert, often paired with arroz con leche"}, {"name": "Chicha morada", "desc": "Purple corn drink, cold and lightly spiced \u2014 the non-alcoholic beverage of Peru, drink it everywhere"}, {"name": "Pisco Sour", "desc": "Peru's national cocktail \u2014 pisco brandy, lime, egg white & bitters. Not to miss, even for non-drinkers, try it once"}]}, "cultureGuide": {"title": "Peru Culture & Immersion Guide", "sections": [{"icon": "fa-church", "color": "#f97316", "title": "\ud83c\udf8a You're in Cusco for Semana Santa \u2014 Easter Week!", "items": [{"name": "Easter 2026 falls April 5 \u2014 you're in Cusco for Holy Week", "detail": "Good Friday (Apr 3) and Easter weekend (Apr 4\u20135) are the biggest celebrations of the year in Cusco. Expect massive candlelit processions through the Plaza de Armas, thousands of devotees, and the entire city draped in incense and flowers."}, {"name": "El Se\u00f1or de los Temblores (Lord of the Earthquakes)", "detail": "Cusco's most revered religious icon \u2014 a dark-skinned Christ figure that survived the 1650 earthquake. Carried in an enormous procession through the streets on Lunes Santo. The streets fill with red \u00f1ucchu flower petals thrown from balconies. One of the most moving spectacles in South America."}, {"name": "Viernes Santo (Good Friday) Processions", "detail": "On the evening of April 3, solemn candlelit processions wind through Cusco's narrow cobblestone streets with massive religious floats. Life-size statues of the Virgin Mary and Christ are carried by hundreds of costumed devotees to the sounds of brass bands and chanting."}, {"name": "Easter Mass at the Cathedral", "detail": "The Cusco Cathedral on Easter Sunday is extraordinary \u2014 packed with centuries of Andean-Catholic syncretism. The famous Cusco School painting of 'The Last Supper' inside shows Christ and his apostles eating guinea pig (cuy) and drinking chicha. A perfect example of how Inca culture absorbed and reshaped Spanish Catholicism."}]}, {"icon": "fa-leaf", "color": "#22c55e", "title": "\ud83c\udf3f Pachamama \u2014 Mother Earth", "items": [{"name": "The most important spiritual concept in the Andes", "detail": "Pachamama (Mother Earth) is not a metaphor \u2014 she is a living deity. Every offering, every sip of chicha spilled on the ground, every coca leaf placed before a meal is a 'pago' (payment) to Pachamama in thanks for her abundance."}, {"name": "Pago a la Tierra ceremony", "detail": "If offered the chance to participate in an earth-offering ceremony in the Sacred Valley or Cusco, say yes. A shaman arranges coca leaves, sweets, llama fat and flowers into a ritual bundle that is then burned as an offering. Deeply moving and totally authentic."}, {"name": "The first sip is always for Pachamama", "detail": "When locals pour chicha or any drink, they flick a few drops onto the ground first. Join them. It says you respect the land you're standing on. Say 'para Pachamama' as you do it."}]}, {"icon": "fa-spa", "color": "#a78bfa", "title": "\ud83c\udf3f Coca Leaves \u2014 Sacred, Not Scary", "items": [{"name": "The altitude medicine that's been used for 8,000 years", "detail": "Coca leaves contain mild alkaloids that help with altitude sickness \u2014 they improve oxygen uptake, reduce nausea and headache. A cup of mate de coca (coca tea) at your hotel on arrival in Cusco is standard practice and essential. It tastes like green tea."}, {"name": "Chewing coca leaves", "detail": "Place 5\u20136 leaves in your cheek with a small piece of bicarbonate (bicarbonato) or ash activator. Hold, don't chew. Your cheek will go slightly numb. It's mild, legal in Peru, and deeply tied to Andean identity. Locals offer it as a gesture of welcome \u2014 always accept respectfully."}, {"name": "It is NOT cocaine", "detail": "The alkaloid concentration in coca leaves is extremely low \u2014 comparable to caffeine in coffee. It requires massive chemical processing to become cocaine. You'll see it sold openly everywhere in Cusco. Don't worry, and don't be rude by refusing when offered."}]}, {"icon": "fa-sun", "color": "#eab308", "title": "\u2600\ufe0f Inca Cosmology \u2014 Three Worlds, Three Animals", "items": [{"name": "The three sacred worlds", "detail": "Hanan Pacha (upper/sky world \u2014 the condor), Kay Pacha (the present living world \u2014 the puma), Uku Pacha (the inner/underworld \u2014 the serpent). You will see the condor, puma and serpent motif carved into every Inca wall, woven into every textile, and built into the very layout of Cusco (designed in the shape of a puma)."}, {"name": "Inti \u2014 the Sun God", "detail": "Everything in Cusco is oriented toward the sun. The Inca Empire was literally called Tawantinsuyu \u2014 'Four Corners of the World' \u2014 with Cusco as the navel (qosqo in Quechua). Qorikancha (Temple of the Sun) had walls lined in pure gold to reflect sunlight. At solstices, the light still enters the doorway perfectly."}, {"name": "Quechua \u2014 the living Inca language", "detail": "Learn a few words: 'Allianchu?' (How are you?), 'Allinmi' (I'm well), 'Sulpayki' (Thank you), 'Sumaq' (Beautiful). Quechua is spoken by millions in the Andes today. Using even one phrase will delight locals and connect you instantly."}]}, {"icon": "fa-shopping-bag", "color": "#6366f1", "title": "\ud83d\udecd\ufe0f Markets & Bargaining Etiquette", "items": [{"name": "Bargaining is expected \u2014 and is a social ritual", "detail": "At artisan markets (Pisac, San Pedro, Barranco), haggling is completely normal and expected. Start at 60\u201370% of the asking price. Be warm and playful \u2014 it's a dance, not a confrontation. Smile, joke, and enjoy it. Never be aggressive or dismissive."}, {"name": "The golden rule: don't pick something up unless you're interested", "detail": "Handling an item signals interest and opens negotiation. If you pick it up and ask the price, you're in the game. If you're browsing, keep your hands free and just look."}, {"name": "Alpaca vs. llama vs. vicu\u00f1a", "detail": "Baby alpaca is the softest \u2014 velvety and warm, not scratchy. Regular alpaca is mid-grade. Llama wool is rougher. Vicu\u00f1a is the finest fibre in the world (legally protected) \u2014 extremely expensive and very rare. To test real alpaca: it should spring back when you stretch it. Synthetic fakes feel cold and don't spring back."}, {"name": "Check the Centro de Textiles Tradicionales (Day 5)", "detail": "Already on your Day 5 itinerary after Rainbow Mountain. This is the best place to understand what authentic handwoven textiles look like and what the patterns mean. Buy here knowing the artisan was paid fairly."}]}, {"icon": "fa-music", "color": "#ec4899", "title": "\ud83c\udfb5 Music & Dance to Experience", "items": [{"name": "Huayno \u2014 the soul of the Andes", "detail": "The traditional music you'll hear drifting from windows and market stalls in Cusco \u2014 plaintive Andean melodies played on pan flutes, charangos (tiny 10-string guitar) and drums. It sounds ancient because it is. If you hear it live, stop and listen."}, {"name": "Marinera \u2014 Peru's national dance", "detail": "An elegant handkerchief-waving courtship dance from the coast, declared national heritage. You may catch performances in Lima's Barranco. Fast, flirtatious, beautiful to watch."}, {"name": "Festival music during Easter Week", "detail": "During Semana Santa in Cusco, brass bands play mournful hymns during the Good Friday processions. On Easter Sunday the mood flips to celebration \u2014 music, dancing, and fireworks in the Plaza de Armas. Being in Cusco for this is genuinely rare and special."}]}, {"icon": "fa-users", "color": "#14b8a6", "title": "\ud83e\udd1d Social Customs & Etiquette", "items": [{"name": "Hora peruana (Peruvian time)", "detail": "Being 15\u201330 minutes late is completely normal in Peru. It's not rude \u2014 it's cultural. Don't be stressed if a guide or tour is a little late. Just relax and enjoy the pace."}, {"name": "Greeting with a kiss on the cheek", "detail": "Even with strangers in social situations, the greeting is a single kiss on the right cheek (cheek-to-cheek gesture). Handshakes are more formal. If locals go in for the cheek greeting, lean in \u2014 refusing can seem cold."}, {"name": "'Buen provecho' / 'Provecho'", "detail": "When passing someone who is eating, or when sitting down at a restaurant, say 'Buen provecho' (enjoy your meal). If someone says it to you, smile and say 'Gracias, igualmente.' It's a warm everyday courtesy you'll hear constantly."}, {"name": "Lunch is the main event", "detail": "Peruvians eat their biggest meal at lunch, not dinner. The 'men\u00fa del d\u00eda' (set lunch menu) at S/10\u201318 is how locals eat \u2014 soup, main, drink. It's the freshest and best-value meal of the day. Seek these out over tourist menus whenever possible."}, {"name": "Photography of people \u2014 always ask first", "detail": "Women in traditional dress in markets are used to being photographed by tourists, but always ask first ('\u00bfPuedo tomar una foto?' = 'Can I take a photo?'). Offer a small tip (S/2\u20133) when appropriate. Never photograph religious ceremonies unless clearly welcomed."}]}, {"icon": "fa-pray", "color": "#f43f5e", "title": "\u26ea Andean-Catholic Syncretism", "items": [{"name": "Churches built on Inca temples", "detail": "Almost every major church in Cusco is built on Inca foundations \u2014 the Spanish deliberately built on top of sacred Inca sites. Qorikancha (Temple of the Sun) has the Santo Domingo Convent built over it. You can see where Inca stone walls (perfectly fitted, no mortar) meet Spanish colonial construction."}, {"name": "The Last Supper with guinea pig", "detail": "Inside Cusco Cathedral hangs Marcos Zapata's 1753 painting of The Last Supper \u2014 with Christ and the apostles eating a whole roasted cuy (guinea pig) at the centre table, and a jug of chicha instead of wine. It's the perfect symbol of how indigenous Andean culture absorbed and transformed Catholic iconography."}, {"name": "Saints that are also Inca deities", "detail": "Many Catholic patron saints in Peru map directly onto Inca deities. The Virgin Mary is often identified with Pachamama. San Juan Bautista with water spirits. This blending happened over centuries and is genuine, not theatrical."}]}]}}, "destinations": [{"name": "Lima", "country": "Peru", "emoji": "\ud83c\uddf5\ud83c\uddea", "lat": -12.0464, "lng": -77.0428, "start": "2026-04-02", "end": "2026-04-03", "color": "#6366f1", "restaurants": [{"name": "El Vegetariano", "neighborhood": "Miraflores", "type": "100% Vegetarian", "priceRange": "$$", "rating": 4.5, "mustTry": ["Causa Lime\u00f1a vegetariana \u2014 chilled mashed potato cake layered with avocado & aji amarillo", "Papas a la Huanca\u00edna \u2014 boiled potatoes in a creamy yellow pepper & queso fresco sauce", "Ceviche vegano \u2014 hearts of palm & mushroom in leche de tigre citrus marinade", "Picarones \u2014 pumpkin & sweet potato fritters with chancaca syrup (classic Lima dessert)"], "note": "Lima's most beloved fully vegetarian restaurant. Right in the heart of Miraflores, great for lunch."}, {"name": "Quinoa Restaurant", "neighborhood": "Miraflores", "type": "Vegan & Vegetarian", "priceRange": "$$$", "rating": 4.6, "mustTry": ["Risotto de quinoa \u2014 creamy Andean-grain risotto with roasted vegetables", "Tiradito de betabel \u2014 thinly sliced roasted beet in tiger's milk with aji amarillo", "Ceviche de palmito \u2014 hearts of palm 'ceviche' that's shockingly authentic"], "note": "Upscale plant-based spot \u2014 one of Lima's best for elevated Peruvian vegetarian cuisine."}, {"name": "Canta Rana", "neighborhood": "Barranco", "type": "Classic Lima Tavern", "priceRange": "$$", "rating": 4.4, "mustTry": ["Papas a la Huanca\u00edna \u2014 the definitive version, served as a starter", "Causa Lime\u00f1a \u2014 cold potato terrine with avocado filling", "Humitas \u2014 steamed fresh corn cakes with cheese, a Peruvian comfort food", "Picarones for dessert \u2014 a must in Barranco"], "note": "Beloved Barranco institution with a bohemian vibe \u2014 perfect after the Bridge of Sighs walk."}, {"name": "D\u00e9p\u00f4t Caf\u00e9", "neighborhood": "Barranco", "type": "Brunch / Caf\u00e9", "priceRange": "$", "rating": 4.5, "mustTry": ["A\u00e7a\u00ed bowl with Amazonian fruits", "Avocado toast with aji amarillo drizzle", "Cold-pressed lucuma & maracuya juice"], "note": "Great morning stop before heading out from Barranco. Trendy, plant-forward, fast service."}, {"name": "La Bodega Verde", "neighborhood": "Barranco", "type": "Veggie-forward Garden Restaurant", "priceRange": "$$", "rating": 4.4, "mustTry": ["Tacu tacu vegano \u2014 crispy pan-fried rice-and-bean cake with salsa criolla", "Rocoto relleno vegetariano \u2014 spicy red pepper stuffed with cheese & quinoa", "Mazamorra morada \u2014 purple corn pudding with dried fruits (iconic Lima dessert)"], "note": "Hidden garden restaurant in Barranco \u2014 lovely for dinner after sunset at the Mirador."}]}, {"name": "Cusco", "country": "Peru", "emoji": "\ud83c\udfd4\ufe0f", "lat": -13.5319, "lng": -71.9675, "start": "2026-04-03", "end": "2026-04-07", "color": "#f97316", "restaurants": [{"name": "Green Point", "neighborhood": "San Blas", "type": "100% Vegetarian & Vegan", "priceRange": "$$", "rating": 4.6, "mustTry": ["Lomo saltado vegano \u2014 mushroom & tofu stir-fry with peppers, tomato & fries (vegan twist on Cusco's iconic dish)", "Sopa de quinoa \u2014 warming Andean quinoa soup with fresh herbs, essential at altitude", "Rocoto relleno vegetariano \u2014 roasted Cusco pepper stuffed with cheese & vegetables", "Chicha morada \u2014 purple corn drink to sip all day at altitude"], "note": "Cusco's best fully vegetarian restaurant, near San Blas \u2014 perfect after exploring the artisan quarter."}, {"name": "Cicciolina", "neighborhood": "Calle Triunfo (near Plaza de Armas)", "type": "Upscale Peruvian-Mediterranean", "priceRange": "$$$", "rating": 4.8, "mustTry": ["Causa de papa amarilla \u2014 silky yellow potato terrine with avocado & aji amarillo cream", "Risotto de quinoa con trucha \u2014 (ask for vegetarian version without trout, they accommodate)", "Pasta al pesto andino \u2014 local herbs pesto with Parmesan", "Tres leches \u2014 Cusco's best version of the classic soaked sponge cake"], "note": "One of Cusco's finest restaurants. Great for a special dinner \u2014 book ahead."}, {"name": "Jack's Caf\u00e9", "neighborhood": "Cuesta San Blas", "type": "Caf\u00e9 / All-day Breakfast", "priceRange": "$", "rating": 4.5, "mustTry": ["Full vegetarian breakfast \u2014 eggs, avocado, roasted potatoes, homemade bread", "Granola bowl with fresh Peruvian fruits", "Fresh squeezed maracuya (passion fruit) juice \u2014 helps with altitude"], "note": "Beloved by locals and travellers alike. Best breakfast in Cusco, especially after a big hiking day."}, {"name": "Chicha by Gast\u00f3n Acurio", "neighborhood": "Plaza Regocijo", "type": "Modern Cusque\u00f1a Cuisine", "priceRange": "$$$", "rating": 4.7, "mustTry": ["Ensalada de quinoa \u2014 Andean grain salad with roasted beets, cheese & citrus", "Sopa de man\u00ed \u2014 peanut soup with potato & fresh herbs, a Cusco classic", "Choclo con queso \u2014 giant Andean corn with fresh cheese (simple but iconic)", "Pastel de papa \u2014 layered potato gratin with Andean spices"], "note": "Gast\u00f3n Acurio's Cusco flagship. Modern take on regional Andean cooking \u2014 vegetarian options clearly marked."}, {"name": "Morena Peru", "neighborhood": "Centro Hist\u00f3rico", "type": "Traditional Peruvian", "priceRange": "$$", "rating": 4.5, "mustTry": ["Papas a la Huanca\u00edna \u2014 creamy yellow pepper sauce over Andean potatoes", "Quinoto \u2014 Cusco's version of risotto made entirely from quinoa", "Humitas de choclo \u2014 sweet fresh corn cakes with melted cheese inside", "Ponche cusque\u00f1o \u2014 warm spiced drink with peanuts & cinnamon (perfect for cold nights)"], "note": "Authentic Cusco flavours in a warm setting near the historic centre."}]}, {"name": "Lima (Return)", "country": "Peru", "emoji": "\ud83c\udf0a", "lat": -12.1167, "lng": -77.0397, "start": "2026-04-07", "end": "2026-04-08", "color": "#22c55e", "restaurants": [{"name": "El Vegetariano", "neighborhood": "Miraflores", "type": "100% Vegetarian", "priceRange": "$$", "rating": 4.5, "mustTry": ["Causa Lime\u00f1a vegetariana", "Papas a la Huanca\u00edna", "Ceviche vegano de palmito"], "note": "Already on Day 6 \u2014 a reliable go-to for a quick veggie lunch back in Lima."}, {"name": "Isolina Taberna Peruana", "neighborhood": "Barranco", "type": "Classic Lima Tavern", "priceRange": "$$$", "rating": 4.7, "mustTry": ["Pepi\u00e1n de choclo \u2014 spiced corn stew with cheese and aji panca (vegetarian)", "Tacu tacu de frijoles \u2014 crispy bean-and-rice cake with salsa criolla", "Arroz con leche + mazamorra morada \u2014 Lima's classic 'combinado' dessert"], "note": "One of Lima's top restaurants \u2014 Jos\u00e9 del Castillo's celebration of Lima's criollo home cooking. Great for a special return dinner."}]}, {"name": "Paracas & Huacachina", "country": "Peru", "emoji": "\ud83c\udfdc\ufe0f", "lat": -13.8333, "lng": -76.25, "start": "2026-04-08", "end": "2026-04-09", "color": "#eab308", "restaurants": [{"name": "La Trattoria del Bucanero", "neighborhood": "Paracas El Chaco", "type": "Italian / International", "priceRange": "$$", "rating": 4.3, "mustTry": ["Pizza Margherita \u2014 simple, solid, reliably vegetarian", "Pasta al pomodoro or pesto", "Fresh tropical fruit juices"], "note": "Best vegetarian-safe option in Paracas \u2014 mostly a seafood town, so Italian is your friend here."}, {"name": "El Huacachinero", "neighborhood": "Huacachina Oasis", "type": "Oasis Bar & Restaurant", "priceRange": "$", "rating": 4.1, "mustTry": ["Arroz chaufa vegetariano \u2014 Peruvian-Chinese fried rice with vegetables", "Fried yuca with aji sauce \u2014 a crispy, addictive snack before sandboarding", "Chicha morada \u2014 refreshing purple corn drink in the desert heat"], "note": "Right on the lagoon edge at Huacachina \u2014 grab a cold drink and food before or after the dunes."}]}], "days": [{"date": "2026-04-02", "dayNum": 1, "destination": "Lima", "label": "Lima Arrival \u2014 Malec\u00f3n, Centro Hist\u00f3rico & Barranco Walk", "weather": {"temp": 22, "high": 24, "low": 19, "condition": "Partly cloudy", "icon": "fa-cloud-sun"}, "activities": [{"id": "lima-d1-a1", "time": "08:00", "period": "Morning", "name": "Breakfast at Homemade / Rutina Caf\u00e9", "desc": "Start easy at one of Miraflores' most loved breakfast spots. Homemade does fresh a\u00e7a\u00ed bowls, avocado toast, and cold-pressed juices. Rutina Caf\u00e9 next door for excellent espresso and eggs. Both are in central Miraflores \u2014 take your time, it's the first day.", "duration": "1 hr", "cost": 20, "lat": -12.1195, "lng": -77.0362, "rating": 4.6, "booking": false, "category": "food", "hours": "Mon\u2013Sun 8:00am \u2013 5:00pm"}, {"id": "lima-d1-a2", "time": "09:15", "period": "Morning", "name": "Malec\u00f3n de Miraflores by Bike + Parque del Amor + Faro", "desc": "Rent a bike right on the Malec\u00f3n (~S/10\u201315/hr) and ride Lima's stunning 8km clifftop promenade above the Pacific. Stop at Parque del Amor \u2014 a mosaic-tiled park inspired by Gaud\u00ed, with the famous lovers' statue. Continue south to the Faro de la Marina lighthouse perched on the cliffs \u2014 the best viewpoint along the entire stretch, with the ocean spread out below. Paragliders launch from the clifftops overhead all morning. Return bike near Larcomar at the south end.", "duration": "2 hrs", "cost": 15, "lat": -12.1243, "lng": -77.0301, "rating": 4.8, "booking": false, "category": "scenic", "hours": "Always open \u2014 bike stalls 8am\u20136pm"}, {"id": "lima-d1-a3", "time": "11:15", "period": "Late Morning", "name": "Kennedy Park & Larcomar Cliffside Mall", "desc": "Kennedy Park is Miraflores' living room \u2014 its resident cats roam freely among the benches and flower beds. A 5-minute walk leads to Larcomar, a spectacular open-air mall built into the sea cliffs. You don't need to shop \u2014 the terrace views of the Pacific are worth stopping for. Grab a coffee and enjoy the view before heading north to the historic centre.", "duration": "45 min", "cost": 0, "lat": -12.1192, "lng": -77.0367, "rating": 4.5, "booking": false, "category": "scenic", "hours": "Larcomar: daily 11am\u201310pm; Park: always open"}, {"id": "lima-d1-a4", "time": "12:15", "period": "Afternoon", "name": "Plaza de Armas, Cathedral, Jir\u00f3n de la Uni\u00f3n & Plaza San Mart\u00edn", "desc": "Taxi north to Lima's UNESCO-listed historic centre. Plaza de Armas is Lima's magnificent main square \u2014 framed by the Government Palace and the Bas\u00edlica Cathedral (entry ~S/15 to see the gold altars inside). Walk Jir\u00f3n de la Uni\u00f3n, the pedestrianised boulevard heading south, buzzing with street performers and lined with historic buildings. It leads straight to Plaza San Mart\u00edn \u2014 a beautiful neoclassical square with a grand bronze equestrian statue. Grab lunch at one of the balcony restaurants overlooking Plaza de Armas (Inka Grill or Limbus Resto Bar have great views).", "duration": "2 hrs", "cost": 30, "lat": -12.0464, "lng": -77.0307, "rating": 4.8, "booking": false, "category": "history", "hours": "Cathedral: Mon\u2013Sat 10am\u20135pm; Plazas: always open"}, {"id": "lima-d1-a5", "time": "14:15", "period": "Afternoon", "name": "San Francisco Basilica & Catacombs \u2014 'City of Bones'", "desc": "A 3-minute walk from Plaza de Armas. The 17th-century Monastery of San Francisco hides something extraordinary underground \u2014 catacombs where 70,000 people are buried, their bones arranged in geometric spirals, circles, and crosses of femurs and skulls. Tirthesha called this the 'city of bones' and it absolutely delivers. Guided tours every 15 minutes, entry ~S/15. Eerie, beautiful, and completely unforgettable.", "duration": "1 hr", "cost": 15, "lat": -12.0457, "lng": -77.0298, "rating": 4.8, "booking": false, "category": "history", "hours": "Daily 9am \u2013 5:30pm"}, {"id": "lima-d1-a6", "time": "15:30", "period": "Late Afternoon", "name": "Taxi Back to Malec\u00f3n \u2014 Start the Cliff Walk to Barranco", "desc": "Taxi 25 min back south to the Malec\u00f3n near Larcomar (ask for 'Malec\u00f3n de Miraflores'). From here, follow the famous coastal cliff path south toward Barranco \u2014 a beautiful 3km walk along the clifftops above the Pacific, passing through Miraflores' southern edge into Barranco. The path hugs the edge of the cliffs with the ocean crashing far below on your left. This is one of Lima's great walks \u2014 calm, scenic, and the perfect transition between the city's history and its bohemian soul.", "duration": "40 min", "cost": 0, "lat": -12.131, "lng": -77.0302, "rating": 4.8, "booking": false, "category": "scenic", "hours": "Always open \u2014 path is lit after dark"}, {"id": "lima-d1-a7", "time": "16:30", "period": "Evening", "name": "Barranco \u2014 Bridge of Sighs, El Beso, Bajada de los Ba\u00f1os & Street Art", "desc": "Arrive in Lima's most bohemian neighbourhood having walked here from the Malec\u00f3n. Cross the Puente de los Suspiros ('Bridge of Sighs') \u2014 hold your breath and make a wish, says the legend. Find El Beso, the iconic romantic mosaic tucked into a side lane. Walk the Bajada de los Ba\u00f1os stairway down toward the beach cliffs. Then wander freely \u2014 Barranco's street art is everywhere, world-class murals on every wall, galleries and bars spilling out onto the streets.", "duration": "2 hrs", "cost": 0, "lat": -12.1524, "lng": -77.0218, "rating": 4.8, "booking": false, "category": "culture", "hours": "Always open"}, {"id": "lima-d1-a8", "time": "18:45", "period": "Evening", "name": "Sunset at Mirador Catalina Recavarren + Dinner in Barranco", "desc": "The best sunset viewpoint in Barranco \u2014 a clifftop terrace where the Pacific turns gold and deep orange as the sun drops (~6:15pm in April). After the sunset, dinner nearby: Isolina Taberna Peruana for legendary criollo home cooking (the most loved restaurant in Barranco). Canta Rana for a classic no-frills seafood institution since 1958. Or finish with a Pisco Sour at Bar Ayahuasca in a stunning restored colonial mansion.", "duration": "2.5 hrs", "cost": 55, "lat": -12.152, "lng": -77.0215, "rating": 4.8, "booking": false, "category": "food", "hours": "Sunset ~6:15pm; restaurants from 7pm"}], "transports": [{"from": "lima-d1-a1", "to": "lima-d1-a2", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "10 min", "cost": "Free", "detail": "Head west from the caf\u00e9 toward the Malec\u00f3n clifftops \u2014 bike stalls start at the top"}]}, {"from": "lima-d1-a2", "to": "lima-d1-a3", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "5 min", "cost": "Free", "detail": "Return bike near Larcomar and walk a few minutes to Kennedy Park"}]}, {"from": "lima-d1-a3", "to": "lima-d1-a4", "options": [{"mode": "Taxi / Uber", "icon": "fa-car", "time": "25 min", "cost": "S/20\u201325", "detail": "Head north to Lima's Historic Centre \u2014 ask for Plaza de Armas"}, {"mode": "Bus (Metropolitano)", "icon": "fa-bus", "time": "40 min", "cost": "S/2.50", "detail": "Metropolitano BRT northbound from Paseo de la Rep\u00fablica"}]}, {"from": "lima-d1-a4", "to": "lima-d1-a5", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "3 min", "cost": "Free", "detail": "San Francisco Basilica is on Jir\u00f3n Ancash, 2 minutes from Plaza de Armas"}]}, {"from": "lima-d1-a5", "to": "lima-d1-a6", "options": [{"mode": "Taxi / Uber", "icon": "fa-car", "time": "25 min", "cost": "S/20", "detail": "Head south to the Malec\u00f3n near Larcomar \u2014 ask for 'Malec\u00f3n Miraflores sur'"}]}, {"from": "lima-d1-a6", "to": "lima-d1-a7", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "40 min", "cost": "Free", "detail": "Follow the coastal cliff path south from the Malec\u00f3n \u2014 keep the Pacific on your right, follow signs to Barranco"}]}, {"from": "lima-d1-a7", "to": "lima-d1-a8", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "5 min", "cost": "Free", "detail": "Mirador Catalina Recavarren is a short walk from the Bridge of Sighs; dinner restaurants all nearby in Barranco"}]}]}, {"date": "2026-04-03", "dayNum": 2, "destination": "Cusco", "label": "Lima \u2192 Cusco \u2014 Acclimatise & Explore the Old City", "weather": {"temp": 12, "high": 18, "low": 5, "condition": "Partly cloudy", "icon": "fa-cloud-sun"}, "activities": [{"id": "cusco-d2-a1", "time": "04:30", "period": "Morning", "name": "Transfer to Lima Airport", "desc": "Early morning departure. Lima airport is ~30\u201340 min from Miraflores. Check in 90 min before the domestic flight.", "duration": "45 min", "cost": 30, "lat": -11.9774, "lng": -77.1139, "rating": 0, "booking": false, "category": "logistics", "hours": "Flight departs 6:25am"}, {"id": "cusco-d2-a2", "time": "06:25", "period": "Morning", "name": "\u2708\ufe0f Flight: Lima \u2192 Cusco", "desc": "Depart 6:25am, arrive 7:50am. Sit on the left side for dramatic Andean mountain views on approach. The landing between snow-capped peaks is genuinely breathtaking.", "duration": "1h 25m", "cost": 0, "lat": -13.5355, "lng": -71.9389, "rating": 0, "booking": true, "category": "logistics", "hours": "Depart 06:25 \u2014 Arrive 07:50"}, {"id": "cusco-d2-a3", "time": "08:30", "period": "Morning", "name": "Arrive Cusco \u2014 Motto by Hilton Check-in & Altitude Rest", "desc": "Taxi to Motto by Hilton Cusco (Calle Ruinas 502) \u2014 steps from Plaza de Armas, next door to Qorikancha. Altitude Tips: wait 10 minutes after landing before moving quickly. Accept the coca tea at reception and rest for at least 1.5\u20132 hours. Drink 3\u20134L of water. Avoid dairy and alcohol today. Order a warm quinoa or lentil soup at lunch \u2014 one of the best altitude remedies. Mild headache and fatigue are normal.", "duration": "2 hrs", "cost": 25, "lat": -13.5222, "lng": -71.9762, "rating": 0, "booking": false, "category": "relaxation", "hours": "Rest until 11am"}, {"id": "cusco-d2-a4", "time": "11:00", "period": "Late Morning", "name": "Mercado de San Pedro \u2014 Queso Helado & Local Life", "desc": "Walk 10 minutes west from the hotel. San Pedro is Cusco's real local market \u2014 where residents actually shop. Browse stalls of chicha morada, Amazonian fruits, regional cheeses, and dried herbs. Must-try: Queso Helado \u2014 despite the name ('cheese ice cream') it is NOT cheese. It's a sweet frozen dessert of coconut, cinnamon, and sweetened milk for ~S/2. Absolutely get one. Good for small artisan gifts at honest local prices.", "duration": "45 min", "cost": 10, "lat": -13.5228, "lng": -71.9836, "rating": 4.4, "booking": false, "category": "culture", "hours": "Daily 6:00am \u2013 6:00pm"}, {"id": "cusco-d2-a5", "time": "11:50", "period": "Late Morning", "name": "Hatun Rumiyoc & Stone of the 12 Angles", "desc": "Walk 15 minutes east back through Plaza and continue northeast up Calle Hatunrumiyoc. The legendary 12-Angles Stone is embedded in a 600-year-old Inca wall \u2014 a single boulder with 12 perfectly fitted sides, no mortar, no gaps. Modern engineers still can't replicate the technique. The street itself is a window into what Cusco looked like before the Spanish arrived.", "duration": "30 min", "cost": 0, "lat": -13.518, "lng": -71.9755, "rating": 4.6, "booking": false, "category": "history", "hours": "Always open (outdoor street)"}, {"id": "cusco-d2-a6", "time": "12:20", "period": "Afternoon", "name": "San Blas & Calle Siete Borreguitos", "desc": "Continue 8 minutes uphill from Hatun Rumiyoc into the San Blas barrio. Head for Calle Siete Borreguitos \u2014 one of Cusco's most photographed cobblestone stairways, lined with flower-draped walls and artisan workshops. Take it slow going up (altitude) and shoot everything. Wander the wider San Blas neighbourhood \u2014 ceramics, silverwork, indie caf\u00e9s.", "duration": "45 min", "cost": 0, "lat": -13.5148, "lng": -71.9757, "rating": 4.7, "booking": false, "category": "culture", "hours": "Always open"}, {"id": "cusco-d2-a7", "time": "13:15", "period": "Afternoon", "name": "Sacsayhuam\u00e1n \u2014 Inca Megalithic Fortress", "desc": "Taxi 5 minutes further uphill from San Blas (or a steep 20-min walk \u2014 taxi recommended at altitude). Sacsayhuam\u00e1n is the most awe-inspiring Inca site in Cusco and one of the greatest feats of ancient engineering on Earth. Three zigzagging tiers of massive limestone walls, with individual stones weighing up to 360 tonnes \u2014 larger than anything in the Egyptian pyramids. The largest stone is 8.5 metres tall. No one has ever fully explained how they were quarried, transported, and fitted with such precision from 6km away. The views down over the entire city of Cusco from the top are extraordinary. Entry is included in the Boleto Tur\u00edstico (~S/130) \u2014 if you don't have it, entry is S/70 separately.", "duration": "1 hr", "cost": 70, "lat": -13.5086, "lng": -71.982, "rating": 4.9, "booking": false, "category": "history", "hours": "Daily 7am \u2013 6pm"}, {"id": "cusco-d2-a8", "time": "14:30", "period": "Afternoon", "name": "Plaza de Armas \u2014 Lunch, La Compa\u00f1\u00eda & Wander", "desc": "Taxi 10 minutes back down to the heart of Cusco. Grab a table at a balcony restaurant overlooking Plaza de Armas \u2014 watching this extraordinary square from above while you eat is one of the great simple pleasures of the trip. Recommended: Morena Peru (Calle Palacio 136, Tirthesha's pick), Inka Grill, or Limbus Resto Bar. While here, look at La Compa\u00f1\u00eda de Jes\u00fas on the plaza's east side \u2014 the most ornate baroque church facade in the Americas, covered in intricate carved stonework. Wander the colonnaded arcades around the square and soak it all in. This was the ceremonial centre of the entire Inca Empire.", "duration": "1.5 hrs", "cost": 30, "lat": -13.5175, "lng": -71.9786, "rating": 4.9, "booking": false, "category": "food", "hours": "Restaurants from 11:30am"}, {"id": "cusco-d2-a9", "time": "16:15", "period": "Late Afternoon", "name": "Qorikancha \u2014 Temple of the Sun (via Calle Loreto)", "desc": "Walk 8 minutes south from Plaza along Calle Loreto \u2014 the oldest surviving Inca street in Cusco, its original stone walls still intact on both sides after 600 years, completely unchanged. It leads directly toward Qorikancha, which is also right next to your hotel. The Temple of the Sun was the holiest site in the Inca Empire, its walls once covered in 700 solid gold sheets. The Spanish built the Dominican monastery of Santo Domingo directly on top of its foundations \u2014 the resulting fusion of Inca stonework and colonial architecture tells the entire story of conquest in one building. The astronomical garden is not to be missed.", "duration": "1 hr", "cost": 15, "lat": -13.5222, "lng": -71.9762, "rating": 4.8, "booking": false, "category": "history", "hours": "Mon\u2013Sat 8:30am \u2013 5:30pm, Sun 2pm\u20135pm"}, {"id": "cusco-d2-a10", "time": "17:30", "period": "Evening", "name": "Cristo Blanco via Arco de Santa Ana \u2014 Sunset", "desc": "Taxi 10 minutes north (ask for 'Cristo Blanco'). On the walk from the drop-off, pass through the Arco de Santa Ana \u2014 a colonial stone archway perfectly framing the Cusco rooftops below. Continue up to the Cristo Blanco statue and Iglesia San Crist\u00f3bal terrace for the most dramatic 360\u00b0 panorama in the city: red-tiled rooftops, the valley floor, Andes in every direction. Sunset in Cusco in April is around 5:50pm \u2014 arrive by 5:30pm for the golden light. Street vendors sell warm roasted corn and hot chocolate on the way up.", "duration": "1.5 hrs", "cost": 0, "lat": -13.5082, "lng": -71.971, "rating": 4.9, "booking": false, "category": "scenic", "hours": "Always open \u2014 sunset ~5:50pm in April"}, {"id": "cusco-d2-a11", "time": "19:30", "period": "Evening", "name": "Dinner \u2014 Hotel Sagrado, Morena Peru or Cicciolina", "desc": "Walk 15 minutes downhill or taxi 8 minutes back to the Plaza area. Top pick: Hotel Sagrado restaurant \u2014 order the mushroom ravioli in the stunning converted monastery courtyard (Tirthesha's most-raved-about Cusco meal \u2014 book ahead). Alternative: Morena Peru (Calle Palacio 136) for generous Peruvian home cooking. Cicciolina (Calle Triunfo) for tapas and a lively bar. All within 10 minutes of the hotel. Early night \u2014 Sacred Valley pickup at 6am tomorrow.", "duration": "2 hrs", "cost": 45, "lat": -13.5175, "lng": -71.9778, "rating": 4.8, "booking": false, "category": "food", "hours": "From 6:30pm \u2014 book Hotel Sagrado ahead"}], "transports": [{"from": "cusco-d2-a2", "to": "cusco-d2-a3", "options": [{"mode": "Taxi", "icon": "fa-car", "time": "20 min", "cost": "S/25\u201335", "detail": "Official taxis at arrivals \u2014 ask for 'Motto by Hilton, Calle Ruinas'"}]}, {"from": "cusco-d2-a3", "to": "cusco-d2-a4", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "10 min", "cost": "Free", "detail": "Walk west from the hotel toward San Pedro Market on Calle Quera or Santa Clara"}]}, {"from": "cusco-d2-a4", "to": "cusco-d2-a5", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "15 min", "cost": "Free", "detail": "Walk east back through Plaza de Armas, then northeast up Calle Hatunrumiyoc"}]}, {"from": "cusco-d2-a5", "to": "cusco-d2-a6", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "8 min", "cost": "Free", "detail": "Continue uphill north from Hatun Rumiyoc into San Blas \u2014 follow the cobblestones, take it slow at altitude"}]}, {"from": "cusco-d2-a6", "to": "cusco-d2-a7", "options": [{"mode": "Taxi", "icon": "fa-car", "time": "5 min", "cost": "S/5\u20138", "detail": "Short taxi further uphill from San Blas to Sacsayhuam\u00e1n entrance \u2014 recommended over walking at altitude"}, {"mode": "Walk", "icon": "fa-person-walking", "time": "20 min", "cost": "Free", "detail": "Steep 20-min walk uphill from San Blas \u2014 only if feeling strong"}]}, {"from": "cusco-d2-a7", "to": "cusco-d2-a8", "options": [{"mode": "Taxi", "icon": "fa-car", "time": "10 min", "cost": "S/10", "detail": "Taxi back down from Sacsayhuam\u00e1n to Plaza de Armas for lunch"}]}, {"from": "cusco-d2-a8", "to": "cusco-d2-a9", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "8 min", "cost": "Free", "detail": "Walk south from Plaza along Calle Loreto \u2014 the oldest Inca street in Cusco, intact stone walls on both sides"}]}, {"from": "cusco-d2-a9", "to": "cusco-d2-a10", "options": [{"mode": "Taxi", "icon": "fa-car", "time": "10 min", "cost": "S/8\u201310", "detail": "Taxi north from the hotel \u2014 ask for 'Cristo Blanco' or 'Mirador San Crist\u00f3bal'"}, {"mode": "Walk", "icon": "fa-person-walking", "time": "25 min", "cost": "Free", "detail": "Steep uphill walk via Calle Resbalosa \u2014 pass through Arco de Santa Ana on the way up"}]}, {"from": "cusco-d2-a10", "to": "cusco-d2-a11", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "15 min", "cost": "Free", "detail": "Walk downhill from Cristo Blanco back toward the Plaza area for dinner"}, {"mode": "Taxi", "icon": "fa-car", "time": "8 min", "cost": "S/8", "detail": "Quick taxi back down to the Plaza area"}]}]}, {"date": "2026-04-04", "dayNum": 3, "destination": "Cusco", "label": "Sacred Valley 2-Day Tour \u2014 Day 1 \u2705 BOOKED", "weather": {"temp": 14, "high": 20, "low": 6, "condition": "Sunny", "icon": "fa-sun"}, "activities": [{"id": "cusco-d3-a1", "time": "06:00", "period": "Morning", "name": "Hotel Pickup \u2014 Sacred Valley Tour", "desc": "Your pre-booked guide picks you up. The Sacred Valley (Valle Sagrado) sits at ~2,800m \u2014 lower than Cusco, easier breathing. Today covers major Inca sites along the valley floor.", "duration": "30 min", "cost": 0, "lat": -13.509, "lng": -71.9788, "rating": 0, "booking": true, "category": "logistics", "hours": "Pickup time confirmed with tour operator"}, {"id": "cusco-d3-a2", "time": "08:00", "period": "Morning", "name": "Pisac Inca Ruins & Market", "desc": "One of the most impressive Inca hilltop citadels in the Sacred Valley \u2014 stunning agricultural terraces (andenes) carved into the mountainside. Below, the colourful Pisac artisan market sells alpaca textiles, ceramics, and jewelry at lower prices than Cusco.", "duration": "3 hrs", "cost": 0, "lat": -13.4159, "lng": -71.8484, "rating": 4.7, "booking": true, "category": "history", "hours": "Site open 7am\u20135:30pm (included in tour)"}, {"id": "cusco-d3-a3", "time": "12:00", "period": "Afternoon", "name": "Valley Buffet Lunch", "desc": "Buffet lunch at a local restaurant in the Sacred Valley. Typical Andean dishes \u2014 quinoa soup, fresh trout, native potato varieties (Peru has 3,000+!). Vegetarian options available \u2014 confirm with guide beforehand.", "duration": "1 hr", "cost": 0, "lat": -13.46, "lng": -71.98, "rating": 4.3, "booking": true, "category": "food", "hours": "Tour-included lunch"}, {"id": "cusco-d3-a4", "time": "14:00", "period": "Afternoon", "name": "Moray & Maras Salt Mines", "desc": "Moray: mysterious circular Inca terraced depressions believed to be an agricultural laboratory \u2014 each ring maintains a different microclimate. Maras: thousands of salt pans cascading down a hillside, worked since pre-Inca times. Some of the most otherworldly landscapes you'll see anywhere in the world.", "duration": "2.5 hrs", "cost": 0, "lat": -13.3436, "lng": -72.1901, "rating": 4.8, "booking": true, "category": "history", "hours": "Included in tour"}, {"id": "cusco-d3-a5", "time": "17:00", "period": "Evening", "name": "Ollantaytambo \u2014 Explore & Overnight", "desc": "A living Inca town where residents still inhabit original 15th-century stone houses. The massive Ollantaytambo fortress \u2014 the only Inca site where the Inca actually defeated the Spanish \u2014 looms above. Explore at dusk when crowds thin. Overnight here before Machu Picchu.", "duration": "3 hrs", "cost": 0, "lat": -13.2591, "lng": -72.2653, "rating": 4.9, "booking": true, "category": "history", "hours": "Site open 7am\u20136pm"}], "transports": [{"from": "cusco-d3-a2", "to": "cusco-d3-a3", "options": [{"mode": "Tour Bus", "icon": "fa-bus", "time": "45 min", "cost": "Included", "detail": "Tour bus drives along the Sacred Valley floor"}]}]}, {"date": "2026-04-05", "dayNum": 4, "destination": "Cusco", "label": "Machu Picchu \u2014 2-Day Tour Day 2 \u2705 BOOKED", "weather": {"temp": 16, "high": 22, "low": 10, "condition": "Partly cloudy", "icon": "fa-cloud-sun"}, "activities": [{"id": "cusco-d4-a1", "time": "05:30", "period": "Morning", "name": "Train: Ollantaytambo \u2192 Aguas Calientes", "desc": "Board the Peru Rail or Inca Rail. The 1h40m journey descends through cloud forest along the Urubamba River \u2014 one of the most beautiful train rides in the world. Watch jungle replace highland as you descend into the Amazon watershed. Vegetarian picks in Aguas Calientes: Indio Feliz (French-Peruvian, great veggie cr\u00eapes & quinoa dishes), and Toto's House buffet with a solid vegetarian spread. Try the quinoa soup here \u2014 altitude cooking makes it especially warming.", "duration": "1h 40min", "cost": 0, "lat": -13.154, "lng": -72.5257, "rating": 4.9, "booking": true, "category": "logistics", "hours": "Depart as per tour schedule"}, {"id": "cusco-d4-a2", "time": "07:30", "period": "Morning", "name": "Bus Up to Machu Picchu", "desc": "Shuttle bus from Aguas Calientes up the steep switchback road to the entrance (30 min, ~$24 return \u2014 usually included). Entry requires timed ticket. Arrive early for misty morning atmosphere.", "duration": "30 min", "cost": 0, "lat": -13.1631, "lng": -72.545, "rating": 5.0, "booking": true, "category": "history", "hours": "Site open 6am\u20135:30pm (timed entry)"}, {"id": "cusco-d4-a3", "time": "08:00", "period": "Morning", "name": "Guided Tour of Machu Picchu", "desc": "The Lost City of the Incas \u2014 one of the New Seven Wonders of the World. Your guide covers the Temple of the Sun, Intihuatana stone (Inca sundial), Royal Tomb, and iconic terraces. Early morning light with mist rising from the jungle valley below is extraordinary.", "duration": "3 hrs", "cost": 0, "lat": -13.1631, "lng": -72.545, "rating": 5.0, "booking": true, "category": "history", "hours": "With guide as per tour"}, {"id": "cusco-d4-a4", "time": "11:30", "period": "Afternoon", "name": "Sun Gate Hike (Inti Punku)", "desc": "Hike to the Sun Gate for panoramic views of the entire citadel from above \u2014 45 min moderate hike. The original entry point for Inca Trail trekkers. Bring sunscreen \u2014 altitude UV is intense even in cloud.", "duration": "2 hrs", "cost": 0, "lat": -13.1551, "lng": -72.5364, "rating": 4.8, "booking": false, "category": "nature", "hours": "Accessible with site ticket"}, {"id": "cusco-d4-a5", "time": "14:00", "period": "Afternoon", "name": "Lunch in Aguas Calientes", "desc": "Bus back down and lunch in Aguas Calientes. Try Indio Feliz (French-Peruvian fusion, excellent vegetarian options) or El Mapi. The town has a fun jungle-town vibe with the rushing Urubamba River running through it. Vegetarian picks in Aguas Calientes: Indio Feliz (French-Peruvian, great veggie cr\u00eapes & quinoa dishes), and Toto's House buffet with a solid vegetarian spread. Try the quinoa soup here \u2014 altitude cooking makes it especially warming.", "duration": "1.5 hrs", "cost": 30, "lat": -13.154, "lng": -72.5257, "rating": 4.4, "booking": false, "category": "food", "hours": "Restaurants open 11am\u20139pm"}, {"id": "cusco-d4-a6", "time": "16:00", "period": "Late Afternoon", "name": "Train Back to Cusco", "desc": "Return train from Aguas Calientes to Ollantaytambo, then bus/van back to Cusco. Arrive evening \u2014 well deserved rest!", "duration": "3.5 hrs", "cost": 0, "lat": -13.509, "lng": -71.9788, "rating": 0, "booking": true, "category": "logistics", "hours": "As per tour schedule"}], "transports": [{"from": "cusco-d4-a1", "to": "cusco-d4-a2", "options": [{"mode": "Shuttle Bus", "icon": "fa-bus", "time": "30 min", "cost": "$24 return", "detail": "Buses from bridge in Aguas Calientes every 15 min from 5:30am"}]}]}, {"date": "2026-04-06", "dayNum": 5, "destination": "Cusco", "label": "Rainbow Mountain \u2705 BOOKED", "weather": {"temp": 8, "high": 15, "low": -2, "condition": "Sunny", "icon": "fa-sun"}, "activities": [{"id": "cusco-d5-a1", "time": "03:30", "period": "Morning", "name": "Very Early Pickup", "desc": "Tours depart at 3:30\u20134am. Dress in maximum warm layers \u2014 it can be below freezing at the trailhead (5,000m). Bring snacks, 2L water, sunscreen, sunglasses, and gloves.", "duration": "3 hrs drive", "cost": 0, "lat": -13.509, "lng": -71.9788, "rating": 0, "booking": true, "category": "logistics", "hours": "Pickup: 3:30am"}, {"id": "cusco-d5-a2", "time": "07:30", "period": "Morning", "name": "Rainbow Mountain Hike (Vinicunca, 5,200m)", "desc": "Hike to Vinicunca \u2014 the Rainbow Mountain at 5,200m / 17,060ft. The 7km trail (moderate-difficult) rewards you with breathtaking coloured mineral striations: vivid bands of red, green, yellow, purple, and white across the mountain face. One of the most surreal landscapes on Earth. Horse rental available for ~$15 if needed.", "duration": "4 hrs", "cost": 0, "lat": -13.683, "lng": -71.334, "rating": 4.8, "booking": true, "category": "adventure", "hours": "Summit reached ~9:30\u201310am"}, {"id": "cusco-d5-a3", "time": "11:30", "period": "Late Morning", "name": "Lunch at Trail Restaurant", "desc": "Hot lunch near the trailhead \u2014 usually included in tour. Warm soup, rice, and protein/veg. After the altitude effort this tastes incredible.", "duration": "1 hr", "cost": 0, "lat": -13.65, "lng": -71.35, "rating": 4.2, "booking": true, "category": "food", "hours": "Tour-included"}, {"id": "cusco-d5-a4", "time": "13:00", "period": "Afternoon", "name": "Drive Back to Cusco", "desc": "3-hour return drive. Most people sleep \u2014 the early start and altitude take their toll. Return to Cusco mid-afternoon.", "duration": "3 hrs", "cost": 0, "lat": -13.509, "lng": -71.9788, "rating": 0, "booking": true, "category": "logistics", "hours": "Arrive back ~4:30pm"}, {"id": "cusco-d5-a5", "time": "17:00", "period": "Late Afternoon", "name": "Centro Textiles Tradicionales del Cusco", "desc": "A cooperative of indigenous weavers preserving centuries-old Andean textile traditions. Watch master weavers create intricate tapestries using natural dyes from plants and minerals, in patterns that map Inca cosmology. The shop sells authentic pieces directly from the artisans at fair prices \u2014 far superior quality to market stalls. Free entry to watch weaving demonstrations.", "duration": "1 hr", "cost": 0, "lat": -13.5196, "lng": -71.9756, "rating": 4.7, "booking": false, "category": "culture", "hours": "Mon\u2013Sat 8am \u2013 7pm, Sun 8am \u2013 6pm"}, {"id": "cusco-d5-a6", "time": "19:00", "period": "Evening", "name": "Final Cusco Dinner \u2014 Celebrate!", "desc": "Last night in Cusco! MAP Caf\u00e9 (inside the Precolumbian Art Museum, Plaza Nazarenas) is one of Peru's finest \u2014 glass pavilion in a stunning colonial courtyard. For vegetarians: Green Point or Inka's Grill on the Plaza. Raise a Pisco Sour to the mountains \u2014 you've earned it!", "duration": "2 hrs", "cost": 50, "lat": -13.5167, "lng": -71.9786, "rating": 4.8, "booking": false, "category": "food", "hours": "From 6pm"}], "transports": []}, {"date": "2026-04-07", "dayNum": 6, "destination": "Lima (Return)", "label": "Cusco \u2192 Lima \u2014 Surquillo Market, Paragliding, Surf & Magic Water", "weather": {"temp": 21, "high": 23, "low": 18, "condition": "Cloudy", "icon": "fa-cloud"}, "activities": [{"id": "lima-d6-a1", "time": "05:00", "period": "Morning", "name": "Transfer to Cusco Airport", "desc": "Early taxi to Alejandro Velasco Astete Airport. Allow 45+ min for the drive \u2014 check in 90 min before departure.", "duration": "45 min", "cost": 25, "lat": -13.5355, "lng": -71.9389, "rating": 0, "booking": false, "category": "logistics", "hours": "Flight: Cusco 07:00 \u2192 Lima 08:40"}, {"id": "lima-d6-a2", "time": "07:00", "period": "Morning", "name": "\u2708\ufe0f Flight: Cusco \u2192 Lima", "desc": "Depart 7:00am, arrive 8:40am. Window seat on the right side for final Andes views. One last look at those extraordinary snow-capped mountains!", "duration": "1h 40m", "cost": 0, "lat": -11.9774, "lng": -77.1139, "rating": 0, "booking": true, "category": "logistics", "hours": "Arrive Lima 08:40"}, {"id": "lima-d6-a3", "time": "10:00", "period": "Morning", "name": "Surquillo Market (Mercado N\u00b01)", "desc": "Lima's best local food market \u2014 a paradise for foodies. Browse 500+ varieties of potato, exotic Amazonian fruits (camu-camu, lucuma, cherimoya), fresh-made ceviche stalls at S/8\u201312, and everything else Peru grows. Much less touristy than market halls in Miraflores. Bring cash and arrive with an appetite \u2014 snack your way around. The produce vendors are genuinely proud of what they sell.", "duration": "1 hr", "cost": 15, "lat": -12.1052, "lng": -77.0226, "rating": 4.6, "booking": false, "category": "food", "hours": "Mon\u2013Sat 6am \u2013 3pm"}, {"id": "lima-d6-a4", "time": "11:30", "period": "Late Morning", "name": "Paragliding from Malec\u00f3n Miraflores", "desc": "Tandem paragliding off the Malec\u00f3n clifftops over Lima's Pacific coastline \u2014 one of the city's most thrilling experiences. Fly with a certified instructor for 10\u201315 minutes, soaring above the ocean with the whole city spread below you. Cost ~$50\u201380 USD. Operators: Fly Adventure and MiraFly both have desks on the Malec\u00f3n \u2014 no booking needed, just show up. Weather-dependent; mornings have the calmest conditions. You've just come down from Rainbow Mountain \u2014 now it's time to fly over the ocean.", "duration": "1 hr", "cost": 65, "lat": -12.1285, "lng": -77.0305, "rating": 4.9, "booking": false, "category": "adventure", "hours": "Daily 10am\u20135pm (go before 2pm for best conditions)"}, {"id": "lima-d6-a5", "time": "13:00", "period": "Afternoon", "name": "Lunch at El Vegetariano (Miraflores)", "desc": "Lima's oldest vegetarian restaurant (since 1975), serving creative plant-based Peruvian dishes at unbeatable value. Huge menu: quinoa bowls, veggie ceviche, Andean stews, daily specials. Perfect recovery after the paraglide. Located near Parque Kennedy.", "duration": "1 hr", "cost": 20, "lat": -12.1173, "lng": -77.0298, "rating": 4.5, "booking": false, "category": "food", "hours": "Mon\u2013Sun 9am \u2013 9pm"}, {"id": "lima-d6-a6b", "time": "14:30", "period": "Afternoon", "name": "Surf Lesson at Makaha Surf School", "desc": "Lima's most popular surf school on Costa Verde beach, right below the Malec\u00f3n cliffs. Lessons for beginners and intermediates \u2014 board and wetsuit included. The Pacific here is cool (~18\u00b0C) but has fun, consistent waves. A great post-mountains, post-paraglide way to round out Lima's adventure menu. Book ahead at their website or just show up \u2014 instructors are usually available afternoon slots.", "duration": "2 hrs", "cost": 80, "lat": -12.135, "lng": -77.03, "rating": 4.7, "booking": false, "category": "adventure", "hours": "Daily 8am \u2013 6pm", "website": "https://www.makaha.com.pe"}, {"id": "lima-d6-a6", "time": "17:00", "period": "Afternoon", "name": "Bodega Queirolo \u2014 Pisco Tasting, Pueblo Libre", "desc": "Taxi 20 min northwest to the genteel Pueblo Libre neighbourhood. Bodega Queirolo (open since 1880) is a legendary Lime\u00f1o institution \u2014 a working pisco winery and taverna where locals have been coming for generations. Order the pisco sour tasting flight and a plate of anticuchos (Peruvian skewers) or vegetarian causa. No tourist markup, no pretension \u2014 just real Lima in a vine-covered courtyard. Great way to ease into the afternoon.", "duration": "1 hr", "cost": 25, "lat": -12.0757, "lng": -77.0636, "rating": 4.5, "booking": false, "category": "food", "hours": "Mon\u2013Sat 9am \u2013 11pm, Sun 10am \u2013 5pm"}, {"id": "lima-d6-a8", "time": "19:00", "period": "Evening", "name": "Dinner near Parque de la Reserva", "desc": "Taxi 25 min east toward Jes\u00fas Mar\u00eda, close to the Magic Water Circuit. El Rinc\u00f3n Que No Conoces (literally 'The Corner You Don't Know') is a Lima classic, beloved by locals for traditional criollo home cooking at honest prices. Or try Los Girasoles for upscale Peruvian cuisine nearby. Eat a relaxed dinner before the night show \u2014 the area livens up around 8pm.", "duration": "1.5 hrs", "cost": 40, "lat": -12.078, "lng": -77.037, "rating": 4.5, "booking": false, "category": "food", "hours": "Restaurants from 6:30pm"}, {"id": "lima-d6-a9", "time": "20:30", "period": "Night", "name": "Magic Water Circuit \u2014 Night Show", "desc": "The world's largest fountain complex (Guinness World Record) in Parque de la Reserva, just minutes from dinner. 13 illuminated fountains with laser, music, and light projections \u2014 the main show starts at 8:15pm sharp. The Fantasy Fountain lets you walk through a curtain of water. Entry S/5 (\u2248$1.30 USD). One of the most memorable and completely unexpected experiences in Lima \u2014 arrive a few minutes early to get a good spot for the show.", "duration": "1.5 hrs", "cost": 5, "lat": -12.0794, "lng": -77.0356, "rating": 4.6, "booking": false, "category": "culture", "hours": "Tue\u2013Sun, main show 8:15pm sharp"}], "transports": [{"from": "lima-d6-a2", "to": "lima-d6-a3", "options": [{"mode": "Taxi / Uber", "icon": "fa-car", "time": "40 min", "cost": "S/30\u201340", "detail": "From Lima airport to Surquillo \u2014 allow time for airport traffic; drop bags at hotel first if possible"}]}, {"from": "lima-d6-a3", "to": "lima-d6-a4", "options": [{"mode": "Taxi / Uber", "icon": "fa-car", "time": "15 min", "cost": "S/12", "detail": "Head west to Malec\u00f3n Miraflores for paragliding"}]}, {"from": "lima-d6-a4", "to": "lima-d6-a5", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "15 min", "cost": "Free", "detail": "Walk south along Malec\u00f3n toward Miraflores restaurants"}, {"mode": "Taxi / Uber", "icon": "fa-car", "time": "5 min", "cost": "S/6", "detail": "Short taxi to El Vegetariano near Parque Kennedy"}]}, {"from": "lima-d6-a8", "to": "lima-d6-a9", "options": [{"mode": "Walk", "icon": "fa-person-walking", "time": "5 min", "cost": "Free", "detail": "Parque de la Reserva entrance is a short walk from the restaurants on nearby streets"}]}, {"from": "lima-d6-a5", "to": "lima-d6-a6b", "options": [{"mode": "Taxi / Uber", "icon": "fa-car", "time": "10 min", "cost": "S/10", "detail": "Head down to Costa Verde beach below the Malec\u00f3n for surf lessons"}]}, {"from": "lima-d6-a6b", "to": "lima-d6-a6", "options": [{"mode": "Taxi / Uber", "icon": "fa-car", "time": "25 min", "cost": "S/20", "detail": "Head northwest to Pueblo Libre for Bodega Queirolo pisco tasting"}]}, {"from": "lima-d6-a6", "to": "lima-d6-a8", "options": [{"mode": "Taxi / Uber", "icon": "fa-car", "time": "25 min", "cost": "S/22", "detail": "Head east from Pueblo Libre toward Jes\u00fas Mar\u00eda / Parque de la Reserva for dinner"}]}]}, {"date": "2026-04-08", "dayNum": 7, "destination": "Paracas & Huacachina", "label": "Day Trip \u2014 Paracas & Huacachina Desert Oasis", "weather": {"temp": 24, "high": 27, "low": 18, "condition": "Sunny", "icon": "fa-sun"}, "activities": [{"id": "paracas-d7-a1", "time": "04:45", "period": "Morning", "name": "Early Departure \u2014 Lima to Paracas", "desc": "Very early start! A private shuttle or organised tour bus picks you up from your Lima hotel (~5am). It's a 3.5\u20134 hour drive south along the Pan-American Highway to Paracas. Sleep in the van \u2014 bring a pillow. You can book day tours from Lima that include everything (Ballestas + Huacachina) for ~$60\u201390 USD. Recommended operators: Paracas Explorer or Lima Vision.", "duration": "4 hrs", "cost": 15, "lat": -13.8333, "lng": -76.25, "rating": 0, "booking": false, "category": "logistics", "hours": "Depart Lima ~5:00am \u2014 arrive Paracas ~9am"}, {"id": "paracas-d7-a2", "time": "09:30", "period": "Morning", "name": "Ballestas Islands Boat Tour \u2014 Peru's Gal\u00e1pagos", "desc": "The crown jewel of Paracas. A 2-hour speedboat tour around the Ballestas Islands \u2014 home to enormous colonies of sea lions, Humboldt penguins, Peruvian pelicans, boobies, and Inca terns. On the way out, you pass the massive 'Candelabra' geoglyph carved into the cliffs (~182m tall). Wildlife encounters are extraordinary \u2014 sea lions literally climb onto the rocks beside your boat. Entry: ~S/50 per person including boat. One of the best wildlife experiences in South America.", "duration": "2 hrs", "cost": 50, "lat": -13.7749, "lng": -76.3912, "rating": 4.9, "booking": false, "category": "adventure", "hours": "Boats depart Paracas port hourly 8am\u201312pm"}, {"id": "paracas-d7-a3", "time": "12:00", "period": "Afternoon", "name": "Lunch by the Bay \u2014 Paracas Village", "desc": "Fresh seafood lunch right on the waterfront in Paracas village. El Chorro or La Mina are local favourites \u2014 try ceviche made with this morning's catch, chupe de camarones (creamy prawn chowder), and tiradito. Paracas is one of the best places in Peru for ultra-fresh ceviche. Budget ~S/40\u201360 per person.", "duration": "1 hr", "cost": 45, "lat": -13.8304, "lng": -76.2578, "rating": 4.5, "booking": false, "category": "food", "hours": "Waterfront restaurants open 11am\u20135pm"}, {"id": "paracas-d7-a4", "time": "13:30", "period": "Afternoon", "name": "Drive to Huacachina Oasis", "desc": "40-minute drive northeast from Paracas toward Ica city. Huacachina is a tiny natural oasis \u2014 a real lagoon ringed by a cluster of buildings and palm trees, completely surrounded by massive sand dunes up to 100m tall. One of the most surreal landscapes in the world: a mirror-still green lake in the middle of a desert. It looks like it shouldn't exist.", "duration": "40 min", "cost": 10, "lat": -14.0876, "lng": -75.7626, "rating": 0, "booking": false, "category": "logistics", "hours": "Short drive from Paracas"}, {"id": "paracas-d7-a5", "time": "14:30", "period": "Afternoon", "name": "Dune Buggy & Sandboarding \u2014 Huacachina", "desc": "The main event. A dune buggy rips you up and over massive sand dunes (it's terrifying and exhilarating in equal measure), dropping you at various peaks to sandboard back down. The ride itself \u2014 launching over dune crests at speed \u2014 is unlike anything else. Sandboards are included; standing or lying down are both valid strategies. Cost: ~S/40\u201360 per person for a 2-hour tour. Book directly at the oasis with any of the operators at the waterfront.", "duration": "2 hrs", "cost": 50, "lat": -14.0876, "lng": -75.7626, "rating": 4.8, "booking": false, "category": "adventure", "hours": "Tours run 2pm\u20136:30pm (sunset tours are best)"}, {"id": "paracas-d7-a6", "time": "17:30", "period": "Evening", "name": "Sunset from the Dunes", "desc": "Climb to the top of a dune above Huacachina and watch the sun set over the desert. The light turns the sand deep gold and orange as the oasis below glitters in the dying light \u2014 one of Peru's most stunning sunsets. The whole scene \u2014 lagoon, palm trees, dunes, desert sky \u2014 is completely magical. Bring your camera.", "duration": "45 min", "cost": 0, "lat": -14.0876, "lng": -75.7626, "rating": 4.9, "booking": false, "category": "scenic", "hours": "Sunset ~6pm in April"}, {"id": "paracas-d7-a7", "time": "18:30", "period": "Evening", "name": "Drive Back to Lima", "desc": "4-hour return drive to Lima along the Pan-American Highway. Most p const COLS=['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f97316','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#a78bfa','#fb923c'];
function col(i){return COLS[i%COLS.length]}

function fd(s){if(!s)return'';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fdf(s){if(!s)return'';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function fc(n){return(!n||n===0)?'Free':'S/'+n}
function destCol(name){const d=(S.trip?.destinations||[]).find(x=>x.name===name);return d?.color||col(0)}
let _tt;
function toast(msg,type='ok'){
  clearTimeout(_tt);const o=document.getElementById('_t');if(o)o.remove();
  const t=document.createElement('div');t.id='_t';t.className='toast '+type;
  t.innerHTML=`<i class="fas ${type==='ok'?'fa-circle-check':'fa-circle-xmark'}"></i> ${msg}`;
  document.body.appendChild(t);_tt=setTimeout(()=>t.remove(),3200);
}
function dayBudget(day){
  const acts=(day.activities||[]).reduce((s,a)=>s+(a.cost||0),0);
  const food=(day.activities||[]).filter(a=>a.category==='food').reduce((s,a)=>s+(a.cost||0),0);
  const tr=(day.transports||[]).reduce((s,t)=>{const c=((t.options||[])[0]?.cost||'').replace(/[^0-9.]/g,'');return s+(parseFloat(c)||0);},0);
  return{acts:acts-food,food,tr:Math.round(tr),total:Math.round(acts+tr)};
}
function tripBudget(){return(S.trip?.days||[]).reduce((a,d)=>{const b=dayBudget(d);a.acts+=b.acts;a.food+=b.food;a.tr+=b.tr;a.total+=b.total;return a},{acts:0,food:0,tr:0,total:0})}
